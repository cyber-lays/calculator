<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css.css">
    <script src="js.js" defer></script>
    <title>Calculator</title>
</head>
<body>

    <div class="container">
        <div class="input">
            <p class="result">0</p>
        </div>
        <div class="buttons">
            <div class="linezero">
                <button class="zero degit">0</button>
                <button class="dot symb">.</button>
                <button class="equal">=</button>
                <button class="add operations">+</button>
            </div>

            <div class="lineone">
                <button class="one degit">1</button>
                <button class="two degit">2</button>
                <button class="three degit">3</button>
                <button class="subs operations">-</button>
            </div>


            <div class="linetwo">
                <button class="four degit">4</button>
                <button class="five degit">5</button>
                <button class="six degit">6</button>
                <button class="multi operations">×</button>
            </div>


            <div class="linethree">
                <button class="seven degit">7</button>
                <button class="eight degit">8</button>
                <button class="nine degit">9</button>
                <button class="devide operations">÷</button>
            </div>

            <div class="linefour">
                <button class="del">Del</button>
                <button class="clear">AC</button>
            </div>

        
        </div>
    </div>

        
</body>
</html>
